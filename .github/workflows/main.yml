name: Build Flet APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Flet and Dependencies
        run: |
          pip install flet numpy

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK
        run: |
          # Création du dossier assets et déplacement de l'icône par commande
          mkdir -p assets
          cp icon.png assets/icon.png
          
          # Lancement du build
          yes | flet build apk --project "Cortex AI"

      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cortex-ai-app
          path: build/apk/*.apk
          
